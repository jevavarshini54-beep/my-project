<!DOCTYPE html>
<html>

<head>
  <title>Static_Expense_Tracker</title>
  <meta name="viewport" content="width = device-width, initial-scale = 1.0">
  <meta charset="UTF-8">
  <link rel="stylesheet" href="Question-1.css">
</head>

<body>
  <script src="script.js"></script>
  <div>
    <div class="top-part">
      <div class="profile">
        <img src="default_dp.jpg" alt="img">
        <h2>Jeva</h2>
      </div>
      <div class="heading">
        <h2>Expense Tracker</h2>
        <p>"Track Smart, Spend Wise"</p>
      </div>
    </div>
    <div>
      <div class="left-part">
        <button class="pop-up" onclick="openPopup('income')">
          <h3>Income</h3>
        </button>
        <button class="pop-up" onclick="openPopup('expense')">
          <h3>Expense</h3>
        </button>
        <button class="pop-up" onclick="openPopup('balance')">
          <h3>Balance</h3>
        </button>
        <button class="pop-up" onclick="openPopup('savings')">
          <h3>Savings</h3>
        </button>
        <button class="pop-up" onclick="openPopup('transactions')">
          <h3>Transactions</h3>
        </button>
      </div>
      <div class="right-part">
        <div class="bar-chart"></div>
        <div class="pie-chart"></div>
      </div>
    </div>
  </div>

  <dialog id="popup-dialog">
    <div>
      <img src="close_icon.png" alt="close">
      <h2 id="popup-title"></h2>
      <div id="popup-details"></div>
      <table id="popup-table"></table>
    </div>
  </dialog>
</body>

</html>
